# Buffer Integration Config
# Docs: https://buffer.com/developers/api
# Set BUFFER_ACCESS_TOKEN in .env

api:
  base_url: "https://api.bufferapp.com/1"

channels:
  instagram:
    profile_id: "69b89d3d7be9f8b17162d3cd"  # Auto-filled on first run via GET /profiles.json
  twitter:
    profile_id: "69b12a217be9f8b171443d85"  # Auto-filled on first run via channel discovery

image_hosting:
  provider: "imgbb"  # Uses imgbb for public image URLs
  # Set IMGBB_API_KEY in .env (get from https://api.imgbb.com)

scheduling:
  default_timezone: "America/New_York"

category_types:
  single_image: [did-you-know, infographic, prompt-drop]
  carousel: [autopsy, prompt-pattern, user-story]
  text_only: [value-drop]
