# Buffer Integration Config
# Docs: https://buffer.com/developers/api
# Set BUFFER_ACCESS_TOKEN in .env

api:
  base_url: "https://api.bufferapp.com/1"

channels:
  instagram:
    profile_id: ""  # Auto-filled on first run via GET /profiles.json

image_hosting:
  provider: "imgur"  # Uses Imgur for public image URLs
  # Set IMGUR_CLIENT_ID in .env

scheduling:
  default_timezone: "America/Los_Angeles"

category_types:
  single_image: [did-you-know, infographic, prompt-drop]
  carousel: [autopsy, prompt-pattern, user-story]
