id: instagram
name: Instagram

posting_cadence:
  posts_per_day: 3
  slots:
    morning: { time: "8-9am", format: "single_image", purpose: "Scroll-stopper" }
    afternoon: { time: "12-1pm", format: "carousel", purpose: "Educational deep-dive" }
    evening: { time: "6-7pm", format: "single_image_or_carousel", purpose: "Utility / social proof" }

categories:
  autopsy:
    name: "The Prompt Autopsy"
    format: carousel_images
    slot: afternoon
    frequency: "4x per week"
    description: >
      Take a real, bad prompt that most people would write naturally and dissect it
      slide by slide. Show exactly why it fails, what the model "hears" vs. what the
      user meant, and then show the optimized version. The key insight to communicate:
      the failure isn't the model, it's the language mismatch.
    prompt_template: "prompts/instagram/autopsy.md"
    carousel_template: "templates/autopsy/"
    visual_style:
      background: "Coral/black/cream per slide type"
      text_color: "White, black, coral — per slide type"
      layout: "Each slide is a standalone image (1080x1080) with text overlaid"
      typography: "Heading: OpenSans Condensed ExtraBold. Body: OpenSans Condensed SemiBold."
    constraints:
      slides_min: 5
      slides_max: 8
      max_text_per_slide: "~40-60 words max per slide for readability on mobile"
      caption_max_chars: 2200
      hashtags_recommended: 15
    why_it_works: >
      Carousels have the highest save rate on Instagram. Each autopsy demonstrates
      the core product thesis — model-aware optimization — without feeling like an ad.

  did-you-know:
    name: "Did You Know"
    format: single_image
    slot: morning
    frequency: "5x per week"
    description: >
      Surprising facts about how AI models actually process prompts. Short, punchy,
      shareable. One fact per image. Designed to make people stop scrolling and think
      "wait, really?"
    prompt_template: "prompts/instagram/did-you-know.md"
    carousel_template: "templates/did-you-know/"
    visual_style:
      background: "Black (#0A0A0A)"
      text_color: "Coral heading, white body"
      layout: "Single image 1080x1080. Large fact text top, explanation below, coral sidebar."
      typography: "Heading: OpenSans Condensed ExtraBold. Body: OpenSans Condensed SemiBold."
    constraints:
      max_text: "~30 words — one fact, one explanation"
      caption_max_chars: 2200
      hashtags_recommended: 15
    why_it_works: >
      Low-effort to produce, high shareability. These are the "tell a friend" posts.
      People share surprising facts. Drives impressions and profile visits.

  daily-prompt:
    name: "Daily Prompt"
    format: single_image
    slot: morning_or_evening
    frequency: "4x per week"
    description: >
      A before-and-after showcase: the raw prompt someone would naturally type
      vs. the optimized version from Prompt Optimizer. The optimized prompt is
      rendered on the slide image; the caption explains the transformation.
    prompt_template: "prompts/instagram/daily-prompt.md"
    carousel_template: "templates/daily-prompt/"
    visual_style:
      background: "Warm gradient with white card"
      text_color: "Black prompt text on white card"
      layout: "Single image 1080x1350. Optimized prompt on branded gradient background."
      typography: "LilitaOne Regular."
    constraints:
      max_text: "~60-80 words — the prompt must be readable at phone size"
      caption_max_chars: 2200
      hashtags_recommended: 15
    why_it_works: >
      Shows the product's value proposition in one image. People screenshot
      the optimized prompt for reuse. The raw-vs-optimized contrast in the
      caption drives curiosity and saves.

  prompt-pattern:
    name: "Prompt Pattern"
    format: carousel_images
    slot: afternoon
    frequency: "3x per week"
    description: >
      Teach one reusable prompting technique. Educational, deep, save-worthy.
      Each pattern is a transferable skill the reader can apply immediately.
    prompt_template: "prompts/instagram/prompt-pattern.md"
    carousel_template: "templates/prompt-pattern/"
    visual_style:
      background: "Coral/black/cream per slide type"
      text_color: "White, black, coral — per slide type"
      layout: "5-6 slide carousel (1080x1080). Pattern name → problem → technique → example → when to use."
      typography: "Heading: OpenSans Condensed ExtraBold. Body: OpenSans Condensed SemiBold."
    constraints:
      slides_min: 4
      slides_max: 6
      max_text_per_slide: "~40-60 words max"
      caption_max_chars: 2200
      hashtags_recommended: 15
    why_it_works: >
      Educational carousels get saved as reference material. Each pattern teaches
      a skill that makes the reader better at prompting — positioning PO as the authority.

  infographic:
    name: "Prompt Infographic"
    format: single_image
    slot: evening
    frequency: "3x per week"
    description: >
      Cheat sheets, tip compilations, comparison charts, and frameworks.
      Dense, reference-worthy single images designed to be saved and shared.
      Research-backed content sourced from NotebookLM.
    prompt_template: "prompts/instagram/infographic.md"
    carousel_template: "templates/infographic/"
    notebooklm_integration:
      notebook_id: "57639ed8-99e9-47c0-b82d-6d9443f88b51"
      notebook_name: "Prompt Optimizer Research"
      generation:
        orientation: square
        default_detail: detailed
        style_by_type:
          cheat_sheet: professional
          comparison: editorial
          framework: instructional
          data_insight: editorial
      sources:
        - "Prompt Optimizer model-specific guides (from codebase)"
        - "OpenAI, Anthropic, Google model documentation"
        - "Prompt engineering research and community benchmarks"
      workflow: >
        1. Set notebook context: notebooklm use <notebook_id>
        2. Research topic: notebooklm ask "<research question>" --json
        3. Generate infographic: notebooklm generate infographic --orientation portrait --detail detailed --style <style>
        4. Wait for completion: notebooklm artifact wait <artifact_id>
        5. Download: notebooklm download infographic <output_path>
    visual_style:
      background: "Black (#0A0A0A)"
      text_color: "White body, coral accents and headers"
      layout: "Single image 1080x1350 (portrait). Structured layout with sections, columns, or numbered lists."
      typography: "Heading: OpenSans Condensed ExtraBold. Body: OpenSans Condensed SemiBold. Labels: OpenSans Condensed Bold."
    constraints:
      max_text: "High density — but must still be readable at phone size"
      caption_max_chars: 2200
      hashtags_recommended: 15
    why_it_works: >
      Infographics are the #1 saved format on Instagram. Dense reference material
      that people screenshot and return to. NotebookLM ensures factual accuracy
      and research depth that generic AI content can't match.

  user-story:
    name: "User Story"
    format: carousel_images
    slot: evening
    frequency: "2x per week"
    description: >
      Real stories of people using Prompt Optimizer to solve a problem. Social proof
      meets education. Shows the product in action through the user's experience
      without feeling like an ad.
    prompt_template: "prompts/instagram/user-story.md"
    carousel_template: "templates/user-story/"
    visual_style:
      background: "Coral/black/cream per slide type"
      text_color: "White, black, coral — per slide type"
      layout: "5 slide carousel (1080x1080). Problem → old way → the switch → result → takeaway."
      typography: "Heading: OpenSans Condensed ExtraBold. Body: OpenSans Condensed SemiBold."
    constraints:
      slides_min: 4
      slides_max: 6
      max_text_per_slide: "~40-60 words max"
      caption_max_chars: 2200
      hashtags_recommended: 15
    sourcing:
      - "Reach out to active users for testimonials"
      - "Monitor social mentions and DMs"
      - "Create a 'submit your story' form"
      - "Internal team use cases (dogfooding)"
      - "Beta tester feedback"
    why_it_works: >
      Social proof drives trust. User stories show real outcomes, not hypothetical
      benefits. The carousel format lets the story unfold like a narrative.

global_guidelines:
  - "Instagram audiences scroll fast — the hook must land in the first line"
  - "Carousels get the highest save rate — design for saves, not just likes"
  - "Educational content outperforms promotional content for growth"
  - "All post images use the brand color palette: coral, black, cream"
  - "Keep text on slides concise — mobile-first, readable without zooming"
  - "Each post should deliver standalone value even without visiting the product"
  - "Product mentions are minimal — educational first, branded last"
  - "3 posts/day: morning scroll-stopper, afternoon deep-dive, evening utility/social proof"
