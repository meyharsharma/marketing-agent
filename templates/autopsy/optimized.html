<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="base.css">
  <style>
    .slide {
      background: var(--coral);
      padding-top: 60px;
      padding-bottom: 60px;
      gap: 0;
    }

    .heading {
      font-size: 100px;
      color: var(--white);
      margin-bottom: 40px;
      max-width: 700px;
    }

    .prompt-content {
      font-size: 30px;
      line-height: 1.45;
      color: var(--black);
      max-width: 680px;
      overflow: hidden;
    }

    .handle { color: var(--black); }
  </style>
</head>
<body>
  <div class="slide">
    <h2 class="t-heading heading">OPTIMIZED PROMPT</h2>
    <div class="t-body prompt-content">{{prompt}}</div>

    <div class="bookmark">
      <div class="bookmark__shape"></div>
    </div>
    <div class="handle handle--bottom-right">@PROMPTOPTIMZR</div>
  </div>

  <script>
    // Auto-shrink if content overflows
    const el = document.querySelector('.prompt-content');
    let size = 30;
    while (el.scrollHeight > 680 && size > 20) {
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  </script>
</body>
</html>
