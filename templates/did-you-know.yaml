# Did You Know — Single Image Template Definition
#
# Two rotating visual templates:
#   fact_a: Phone mockup (black bg, Montserrat ExtraBold heading, Regular fact)
#   fact_b: Character illustration (charcoal bg, Anton heading, Montserrat Regular fact)

name: Did You Know
description: Surprising AI/prompting fact — single image, two rotating designs
category: did-you-know
platform: instagram

dimensions:
  width: 1080
  height: 1080

style:
  colors:
    black: "#000000"
    charcoal: "#2D2D2D"
    white: "#FFFFFF"
    coral: "#E93B04"
  handle: "@PROMPTOPTIMZR"

slides:
  - type: fact_a
    name: "Did You Know — Phone Mockup"
    placeholders:
      fact:
        description: "The surprising fact — 1-2 sentences, under 30 words"
        required: true
        example: "GPT-4 weights the last instruction 3x more than the first. Put your most important constraint at the end."

  - type: fact_b
    name: "Did You Know — Character"
    placeholders:
      fact:
        description: "The surprising fact — 1-2 sentences, under 30 words"
        required: true
        example: "Claude performs 40% better with XML tags. It's not just formatting — Claude's training data is structured around it."
