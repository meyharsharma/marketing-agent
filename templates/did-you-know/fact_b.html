<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide {
      background-image: url('bg_character.png');
    }

    .fact-text {
      font-family: 'MontserratEB', 'Arial', sans-serif;
      font-weight: 800;
      color: var(--white);
      font-size: 36px;
      text-align: left;
      top: 45%;
      left: 130px;
      width: 400px;
      line-height: 1.5;
    }

    .handle {
      bottom: 35px;
      left: 40px;
      color: var(--white);
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="fact-text">{{fact}}</div>
    <div class="handle">@PROMPTOPTIMIZER</div>
  </div>
  <script>
    // Auto-scale fact text: must fit between current position and handle
    const el = document.querySelector('.fact-text');
    const handle = document.querySelector('.handle');
    const handleTop = handle.getBoundingClientRect().top;
    const gap = 15;
    let size = 36;

    function textFits() {
      return el.getBoundingClientRect().bottom <= handleTop - gap;
    }

    // Grow for short text (up to 54px)
    while (textFits() && size < 54) {
      size += 1;
      el.style.fontSize = size + 'px';
    }
    // Shrink back until it fits (down to 15px)
    while (!textFits() && size > 15) {
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  </script>
</body>
</html>
