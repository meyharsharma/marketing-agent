<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide {
      background-image: url('bg_phone.png');
    }

    .fact-text {
      font-family: 'MontserratEB', 'Arial', sans-serif;
      font-weight: 800;
      color: var(--white);
      font-size: 34px;
      text-align: center;
      top: 62%;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      line-height: 1.5;
    }

    .handle {
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--black);
      background: var(--white);
      padding: 8px 20px;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="fact-text">{{fact}}</div>
    <div class="handle">@PROMPTOPTIMIZER</div>
  </div>
  <script>
    // Auto-scale fact text: must fit between current position and handle
    const el = document.querySelector('.fact-text');
    const handle = document.querySelector('.handle');
    const handleTop = handle.getBoundingClientRect().top;
    const gap = 15; // minimum gap between text bottom and handle top
    let size = 34;

    function textFits() {
      return el.getBoundingClientRect().bottom <= handleTop - gap;
    }

    // Grow for short text (up to 54px)
    while (textFits() && size < 54) {
      size += 1;
      el.style.fontSize = size + 'px';
    }
    // Shrink back until it fits (down to 15px)
    while (!textFits() && size > 15) {
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  </script>
</body>
</html>
