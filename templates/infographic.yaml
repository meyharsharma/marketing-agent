name: Prompt Infographic
description: Dense reference image — cheat sheets, comparisons, frameworks
category: infographic
platform: instagram

# Image is generated by NotebookLM, not Playwright
rendering: notebooklm

dimensions:
  width: 1080
  height: 1350

notebooklm:
  orientation: square
  detail: concise
  style_by_type:
    cheat_sheet: professional
    comparison: editorial
    framework: instructional
    data_insight: editorial

infographic_types:
  - type: cheat_sheet
    name: "Cheat Sheet"
    description: "5-10 numbered/bulleted tips, rules, or techniques"
    example: "The One-Shot Prompt Checklist"

  - type: comparison
    name: "Comparison Chart"
    description: "Side-by-side comparison of 2-3 models, techniques, or approaches"
    example: "ChatGPT vs Claude vs Gemini: Prompt Structure Compared"

  - type: framework
    name: "Framework / Diagram"
    description: "Layered, stacked, or flowchart showing how components relate"
    example: "The Prompt Engineering Stack"

  - type: data_insight
    name: "Data-Backed Insight"
    description: "Single insight supported by data or benchmarks"
    example: "The 37% Rule: How Structure Saves Tokens"
