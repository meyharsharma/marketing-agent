<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="base.css">
  <style>
    .slide {
      background-image: url('bg_payoff.png');
    }
    .closing-overlay {
      top: 290px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 68px;
      line-height: 1.18;
      max-width: 800px;
      width: max-content;
      padding: 12px 24px;
    }
    .cta-overlay {
      top: 500px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 36px;
      line-height: 1.3;
      max-width: 650px;
      width: max-content;
      opacity: 0.7;
      padding: 8px 20px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="text-overlay closing-overlay">{{heading}}</div>
    <div class="text-overlay cta-overlay">{{body}}</div>
  </div>
</body>
</html>
