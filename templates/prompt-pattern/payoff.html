<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="base.css">
  <style>
    .closing-text {
      position: absolute;
      top: 340px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 64px;
      line-height: 1.2;
      text-align: center;
      max-width: 750px;
      width: 100%;
    }

    .cta-text {
      position: absolute;
      top: 530px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      line-height: 1.3;
      text-align: center;
      max-width: 600px;
      color: var(--cream);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="slide">

    <svg class="dashed-line" viewBox="0 0 1080 1080">
      <path d="M -60 810 Q 300 880 540 840 Q 780 800 1140 860" />
    </svg>

    <div class="text-main closing-text">{{heading}}</div>
    <div class="text-sub cta-text">{{body}}</div>

    <div class="bottom-bar">
      <div class="cta-left">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Double Tap to Like</span>
      </div>
      <div class="cta-right">
        <span>Save This Post</span>
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
