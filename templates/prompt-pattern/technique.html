<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="base.css">
  <style>
    .pattern-heading {
      position: absolute;
      font-size: 64px;
      line-height: 1.1;
      max-width: 700px;
      z-index: 20;
    }

    .additional-text {
      position: absolute;
      font-size: 32px;
      line-height: 1.3;
      max-width: 450px;
      z-index: 20;
    }

    .number-circle {
      width: 130px;
      height: 130px;
      z-index: 15;
    }

    /* ── Variant 1: text centered, U-curve bottom, circle at bottom of U ── */
    .slide[data-variant="1"] .pattern-heading {
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .slide[data-variant="1"] .additional-text {
      display: none;
    }

    /* ── Variant 2: text center-left, ascending line, circle lower-left ── */
    .slide[data-variant="2"] .pattern-heading {
      top: 220px;
      left: 120px;
    }
    .slide[data-variant="2"] .additional-text {
      bottom: 110px;
      right: 80px;
      text-align: right;
    }

    /* ── Variant 3: text upper-left, descending line, circle right-center ── */
    .slide[data-variant="3"] .pattern-heading {
      top: 160px;
      left: 120px;
    }
    .slide[data-variant="3"] .additional-text {
      bottom: 110px;
      left: 80px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="slide" data-variant="{{variant}}">

    <svg class="dashed-line" viewBox="0 0 1080 1080">
      <!-- v1: gentle U-curve across bottom (concave up) -->
      <path class="line-v1" d="M -60 810 Q 350 900 540 870 Q 730 840 1140 810" />
      <!-- v2: ascending from lower-left to upper-right -->
      <path class="line-v2" d="M -60 880 Q 250 820 500 680 Q 750 540 1140 380" style="display:none" />
      <!-- v3: descending from upper-left to lower-right (gentler, straighter) -->
      <path class="line-v3" d="M -60 380 Q 300 400 540 530 Q 780 660 1140 700" style="display:none" />
    </svg>

    <div class="number-circle">
      <span>{{number}}</span>
    </div>

    <div class="text-main pattern-heading">{{heading}}</div>
    <div class="text-sub additional-text">{{body}}</div>
  </div>

  <script>
    const slide = document.querySelector('.slide');
    const variant = slide.dataset.variant || '1';

    // Show correct line
    document.querySelectorAll('.dashed-line path').forEach(p => p.style.display = 'none');
    const line = document.querySelector('.line-v' + variant);
    if (line) line.style.display = '';

    // Place circle ON the line at the correct position per variant
    // v1: center of U-curve (50%), v2: lower-left (15%), v3: right side (78%)
    const circlePositions = { '1': 0.48, '2': 0.15, '3': 0.78 };
    const pct = circlePositions[variant] || 0.5;

    if (line) {
      const totalLen = line.getTotalLength();
      const pt = line.getPointAtLength(totalLen * pct);
      const circle = document.querySelector('.number-circle');
      circle.style.left = (pt.x - 65) + 'px';
      circle.style.top = (pt.y - 65) + 'px';
    }
  </script>
</body>
</html>
