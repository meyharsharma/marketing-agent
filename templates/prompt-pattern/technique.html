<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="base.css">
  <style>
    /* ── Variant backgrounds ── */
    .slide[data-variant="1"] { background-image: url('bg_technique_v1.png'); }
    .slide[data-variant="2"] { background-image: url('bg_technique_v2.png'); }
    .slide[data-variant="3"] { background-image: url('bg_technique_v3.png'); }

    /* ── V1: centered text, number at bottom-center circle ── */
    .slide[data-variant="1"] .heading-overlay {
      top: 370px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 68px;
      line-height: 1.12;
      max-width: 700px;
      padding: 12px 20px;
    }
    .slide[data-variant="1"] .body-overlay { display: none; }
    .slide[data-variant="1"] .number-overlay {
      left: 450px;
      top: 805px;
      width: 70px;
      height: 45px;
    }

    /* ── V2: text upper-left, number lower-left circle, body bottom-right ── */
    .slide[data-variant="2"] .heading-overlay {
      top: 215px;
      left: 75px;
      font-size: 68px;
      line-height: 1.12;
      max-width: 600px;
      padding: 12px 20px;
    }
    .slide[data-variant="2"] .body-overlay {
      bottom: 80px;
      right: 50px;
      font-size: 36px;
      line-height: 1.25;
      text-align: right;
      max-width: 500px;
      padding: 8px 16px;
    }
    .slide[data-variant="2"] .number-overlay {
      left: 135px;
      top: 740px;
      width: 70px;
      height: 45px;
    }

    /* ── V3: text upper-left, number right circle, body bottom-left ── */
    .slide[data-variant="3"] .heading-overlay {
      top: 115px;
      left: 75px;
      font-size: 68px;
      line-height: 1.12;
      max-width: 600px;
      padding: 12px 20px;
    }
    .slide[data-variant="3"] .body-overlay {
      bottom: 80px;
      left: 60px;
      font-size: 36px;
      line-height: 1.25;
      max-width: 500px;
      padding: 8px 16px;
    }
    .slide[data-variant="3"] .number-overlay {
      left: 775px;
      top: 640px;
      width: 70px;
      height: 45px;
    }
  </style>
</head>
<body>
  <div class="slide" data-variant="{{variant}}">
    <div class="text-overlay heading-overlay">{{heading}}</div>
    <div class="text-overlay body-overlay">{{body}}</div>
    <div class="number-overlay">{{number}}</div>
  </div>
</body>
</html>
