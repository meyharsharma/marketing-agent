<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="base.css">
  <style>
    .hook-text {
      position: absolute;
      bottom: 260px;
      left: 80px;
      font-size: 58px;
      line-height: 1.15;
      max-width: 500px;
      z-index: 20;
    }

    /* Arrow floats ABOVE the line, not on it */
    .arrow-circle {
      right: 140px;
      top: 340px;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <div class="handle">@PROMPTOPTIMIZR</div>
      <div class="logo"><img src="../../logo.png" style="height: 100px; width: auto;"></div>
    </div>

    <!-- Straighter diagonal line from upper-left to lower-right -->
    <svg class="dashed-line" viewBox="0 0 1080 1080">
      <path d="M -60 300 Q 200 350 540 540 Q 880 730 1140 800" />
    </svg>

    <div class="arrow-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2D2B28" stroke-width="1.5">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </div>

    <div class="text-main hook-text">{{hook_line}}</div>
  </div>
</body>
</html>
