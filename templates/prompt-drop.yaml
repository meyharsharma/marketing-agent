name: Daily Prompt Drop
description: One ready-to-use prompt template optimized for a specific model
category: prompt-drop
platform: instagram

dimensions:
  width: 1080
  height: 1350

slides:
  - type: cover
    name: "Cover"
    placeholders:
      before:
        description: "Text before the highlighted word"
        required: true
        example: "Hook Line"
      highlight:
        description: "Key word(s) with red background highlight"
        required: true
        example: "Comes Here"
      after:
        description: "Text after the highlighted word"
        required: false
        example: "Like This"
      body:
        description: "Body text below the heading"
        required: false
        example: ""

  - type: step
    name: "Prompt Step"
    repeat: true
    min_count: 1
    max_count: 4
    placeholders:
      before:
        description: "Text before the highlighted word"
        required: true
        example: "Define the"
      highlight:
        description: "Key word with red background highlight"
        required: true
        example: "Role"
      after:
        description: "Text after the highlighted word"
        required: false
        example: ""
      body:
        description: "Body / prompt text below the heading"
        required: true
        example: "You are a senior backend developer..."

  - type: closing
    name: "Closing"
    placeholders:
      before:
        description: "Text before the highlighted word"
        required: true
        example: "That's the full"
      highlight:
        description: "Key word with red background highlight"
        required: true
        example: "prompt"
      after:
        description: "Text after the highlighted word"
        required: false
        example: ""
      body:
        description: "CTA text below the heading"
        required: false
        example: "Save and Bookmark this for your next project"
