name: Prompt Pattern
description: Teaches one reusable prompting technique with numbered steps
category: prompt-pattern
platform: instagram

dimensions:
  width: 1080
  height: 1350

slides:
  - type: hook
    name: "The Hook"
    placeholders:
      before:
        description: "Text before the highlighted word"
        required: true
        example: "Your AI forgets the"
      highlight:
        description: "Key word(s) with red background highlight"
        required: true
        example: "middle"
      after:
        description: "Text after the highlighted word"
        required: false
        example: "of your prompt"
      body:
        description: "Body text below the heading"
        required: false
        example: ""

  - type: technique
    name: "Pattern Step"
    repeat: true
    min_count: 2
    max_count: 4
    placeholders:
      before:
        description: "Text before the highlighted word"
        required: true
        example: "Put key rules"
      highlight:
        description: "Key word with red background highlight"
        required: true
        example: "first AND last"
      after:
        description: "Text after the highlighted word"
        required: false
        example: ""
      body:
        description: "One-line explanation"
        required: true
        example: "Repeat your most critical constraint at the end."

  - type: payoff
    name: "Closing"
    placeholders:
      before:
        description: "Text before the highlighted word"
        required: true
        example: "Sandwich your"
      highlight:
        description: "Key word with red background highlight"
        required: true
        example: "constraints"
      after:
        description: "Text after the highlighted word"
        required: false
        example: ""
      body_before:
        description: "CTA text before highlight"
        required: false
        example: "Try"
      body_highlight:
        description: "CTA highlighted text"
        required: false
        example: "Prompt Optimizer"
      body_after:
        description: "CTA text after highlight"
        required: false
        example: "- link in bio"
